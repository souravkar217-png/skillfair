<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skill Fair Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#0f2a5a;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#0f2a5a;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#163b7a;
}

.msg{
    text-align:center;
    margin-top:10px;
    color:green;
}
</style>
</head>

<body>

<div class="container">
    <h2>Skill Fair Registration</h2>

    <form id="regForm">
        <input type="text" id="name" placeholder="Student Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="course" placeholder="Course" required>
        <input type="text" id="sem" placeholder="Semester / Year" required>
        <input type="text" id="project" placeholder="Project Name" required>
        <input type="text" id="place" placeholder="Place" required>

        <button type="submit">Register</button>
    </form>

    <div class="msg" id="msg"></div>
</div>

<script>
document.getElementById("regForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        course: document.getElementById("course").value,
        sem: document.getElementById("sem").value,
        project: document.getElementById("project").value,
        place: document.getElementById("place").value
    };

    const res = await fetch("http://localhost:3000/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const text = await res.text();

    document.getElementById("msg").innerText = text;

    if(res.ok){
        document.getElementById("regForm").reset();
    }
});
</script>

</body>
</html>
