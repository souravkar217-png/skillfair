<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skill Fair Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
    color:white;

    background:
    linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
    url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1920');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.container{
    width:100%;
    max-width:1100px;
    background:rgba(15,23,42,0.55);
    backdrop-filter:blur(6px);
    border-radius:30px;
    padding:45px;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
    border:1px solid rgba(255,255,255,0.15);
}

.header{
    text-align:center;
    margin-bottom:35px;
}

.header h1{
    font-size:34px;
    color:#38bdf8;
    margin-bottom:8px;
    font-weight:700;
}

.header h2{
    font-size:26px;
    color:#ffffff;
    margin-bottom:12px;
    font-weight:600;
}

.header h3{
    font-size:24px;
    color:#22d3ee;
    margin-bottom:10px;
    letter-spacing:2px;
}

.header p{
    color:#cbd5e1;
    font-size:16px;
}

form{
    width:100%;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    font-size:15px;
    font-weight:500;
    color:#f8fafc;
}

input,
select{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:14px;
    background:rgba(255,255,255,0.9);
    color:#0f172a;
    font-size:15px;
    transition:0.3s;
}

input:focus,
select:focus{
    transform:scale(1.02);
    box-shadow:0 0 15px rgba(56,189,248,0.6);
}

.full-width{
    grid-column:1/3;
}

button{
    width:100%;
    padding:17px;
    border:none;
    border-radius:16px;
    background:linear-gradient(to right,#06b6d4,#2563eb);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(37,99,235,0.5);
}

button:disabled{
    opacity:0.7;
    cursor:not-allowed;
}

#message{
    text-align:center;
    margin-top:25px;
    font-size:18px;
    font-weight:600;
}

.success{
    color:#4ade80;
}

.error{
    color:#f87171;
}

.loading{
    color:#facc15;
}

@media(max-width:768px){

    body{
        padding:20px;
    }

    .container{
        padding:25px;
    }

    .header h1{
        font-size:22px;
    }

    .header h2{
        font-size:18px;
    }

    .header h3{
        font-size:18px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    .full-width{
        grid-column:1/2;
    }

}

</style>

</head>

<body>

<div class="container">

    <div class="header">

        <h1>THE GEORGE TELEGRAPH TRAINING INSTITUTE</h1>

        <h2>MIDNAPORE CENTRE</h2>

        <marquee>
            <h3>SKILL FAIR 2026</h3>
        </marquee>

        <p>
            Fill the registration form to receive your participation certificate.
        </p>

    </div>

    <form id="studentForm">

        <div class="form-grid">

            <div class="input-group">

                <label>Student Name</label>

                <input
                    type="text"
                    id="name"
                    placeholder="Enter student name"
                    required
                >

            </div>

            <div class="input-group">

                <label>Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter email address"
                    required
                >

            </div>

            <div class="input-group">

                <label>Course</label>

                <select id="course" required>

                    <option value="">Select Course</option>

                    <option>ACRE</option>
                    <option>ACRT</option>
                    <option>ADHNE</option>
                    <option>ATEV</option>
                    <option>CAOM</option>
                    <option>DAT</option>
                    <option>DHNE</option>
                    <option>DMLT</option>
                    <option>DPT</option>
                    <option>DOTT</option>
                    <option>ELT</option>
                    <option>ESPRT</option>
                    <option>ETE</option>
                    <option>PDFA</option>

                </select>

            </div>

            <div class="input-group">

                <label>Sem / Year</label>

                <select id="sem" required>

                    <option value="">Select Sem / Year</option>

                    <option>1ST</option>
                    <option>2ND</option>
                    <option>3RD</option>
                    <option>FINAL</option>
                    <option>1ST YEAR</option>
                    <option>FINAL YEAR</option>

                </select>

            </div>

            <div class="input-group full-width">

                <label>Project Name</label>

                <input
                    type="text"
                    id="project"
                    placeholder="Enter project name"
                    required
                >

            </div>

            <div class="input-group full-width">

                <label>Place</label>

                <input
                    type="text"
                    id="place"
                    placeholder="Enter place name"
                    required
                >

            </div>

            <div class="full-width">

                <button type="submit" id="submitBtn">
                    Submit Registration
                </button>

            </div>

        </div>

    </form>

    <div id="message"></div>

</div>

<script>

const form = document.getElementById("studentForm");

const message = document.getElementById("message");

const submitBtn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    submitBtn.disabled = true;

    submitBtn.innerHTML = "Submitting...";

    message.className = "loading";

    message.innerHTML = "Please wait... Generating certificate";

    const studentData = {

        name: document.getElementById("name").value,

        email: document.getElementById("email").value,

        course: document.getElementById("course").value,

        sem: document.getElementById("sem").value,

        project: document.getElementById("project").value,

        place: document.getElementById("place").value

    };

    try {

        const response = await fetch(
            "https://skillfair-backend.onrender.com/register",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(studentData)
            }
        );

        const result = await response.json();

        if(result.success){

            message.className = "success";

            message.innerHTML = result.message;

            form.reset();

        }else{

            message.className = "error";

            message.innerHTML = result.message;

        }

    } catch (error) {

        console.log(error);

        message.className = "error";

        message.innerHTML = "Server Error";

    }

    submitBtn.disabled = false;

    submitBtn.innerHTML = "Submit Registration";

});

</script>
<script src="script.js"></script>
</body>
</html>
